name: Refresh Profile Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"
  push:
    branches:
      - main
    paths:
      - scripts/generate_profile_assets.py
      - .github/workflows/refresh-profile-assets.yml

permissions:
  contents: write

jobs:
  refresh-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate profile metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: huanghfzhufeng
        run: python scripts/generate_profile_assets.py

      - name: Commit refreshed assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/metrics.svg
          git diff --cached --quiet && exit 0
          git commit -m "Refresh profile metrics"
          git push
